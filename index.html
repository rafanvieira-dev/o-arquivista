<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O Arquivista - 10 Fases</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <h1 id="game-title">O ARQUIVISTA</h1>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui">
            <span id="levelDisplay" style="color: #3498db;">Nível: 1</span>
            <span id="scoreDisplay">Pontuação: 0</span>
            <span id="timerDisplay" style="color: #f1c40f;">Tempo: 0</span>
            <span id="healthDisplay">Vidas: ❤️❤️❤️</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="enemies.js"></script>
    <script src="level.js"></script>
    <script src="player.js"></script>
    <script src="game.js"></script>
</body>
</html>
